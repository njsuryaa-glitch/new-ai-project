version: "3.9"

services:
  # ================================
  # PostgreSQL 16 + pgvector
  # ================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgrespassword}
      POSTGRES_DB: ${POSTGRES_DB:-rag_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-rag_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ================================
  # Redis Cache & Queue Layer
  # ================================
  redis:
    image: redis:7-alpine
    container_name: rag_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ================================
  # Alembic Migrations (runs once at startup)
  # ================================
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_migrate
    command: >
      sh -c "alembic upgrade head"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgrespassword}@postgres:5432/${POSTGRES_DB:-rag_db}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      API_KEY: ${API_KEY:-default-secret-key}
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  # ================================
  # FastAPI Application
  # ================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgrespassword}@postgres:5432/${POSTGRES_DB:-rag_db}
      REDIS_URL: redis://redis:6379/0
      ENABLE_REDIS: ${ENABLE_REDIS:-false}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      API_KEY: ${API_KEY:-default-secret-key}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-10}
      CHUNK_SIZE: ${CHUNK_SIZE:-500}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-50}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

volumes:
  postgres_data:
    driver: local
